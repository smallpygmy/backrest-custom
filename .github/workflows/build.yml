name: Build and Publish Backrest Custom

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:        # allows manual run

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get latest upstream tag
        id: upstream
        run: |
          TAG=$(curl -s https://api.github.com/repos/garethgeorge/backrest/releases/latest | jq -r .tag_name)
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Check if already built
        id: check
        run: |
          if docker manifest inspect ghcr.io/${{ github.repository_owner }}/backrest-custom:${{ steps.upstream.outputs.tag }} > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Login to GHCR
        if: steps.check.outputs.exists == 'false'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        if: steps.check.outputs.exists == 'false'
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/backrest-custom:${{ steps.upstream.outputs.tag }} -t ghcr.io/${{ github.repository_owner }}/backrest-custom:latest .

      - name: Push Docker image
        if: steps.check.outputs.exists == 'false'
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/backrest-custom:${{ steps.upstream.outputs.tag }}
          docker push ghcr.io/${{ github.repository_owner }}/backrest-custom:latest
