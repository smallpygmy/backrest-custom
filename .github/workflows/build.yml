name: Build and Publish Backrest Custom

# Trigger every 6 hours or manually
on:
  schedule:
    - cron: "0 */6 * * *"  # every 6 hours
  workflow_dispatch:        # allows manual run

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # Step 1: Checkout your repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Get the latest upstream release tag
      - name: Get latest Backrest release
        id: upstream
        run: |
          TAG=$(curl -s https://api.github.com/repos/garethgeorge/backrest/releases/latest | jq -r .tag_name)
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      # Step 3: Check if the image already exists on GHCR
      - name: Check if image exists
        id: check
        run: |
          if docker manifest inspect ghcr.io/smallpygmy/backrest-custom:${{ steps.upstream.outputs.tag }} > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      # Step 4: Login to GHCR using GITHUB_TOKEN
      - name: Login to GHCR
        if: steps.check.outputs.exists == 'false'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # Step 5: Build the Docker image
      - name: Build Docker image
        if: steps.check.outputs.exists == 'false'
        run: |
          docker build \
            -t ghcr.io/smallpygmy/backrest-custom:${{ steps.upstream.outputs.tag }} \
            -t ghcr.io/smallpygmy/backrest-custom:latest \
            .

      # Step 6: Push the Docker image to GHCR
      - name: Push Docker image
        if: steps.check.outputs.exists == 'false'
        run: |
          docker push ghcr.io/smallpygmy/backrest-custom:${{ steps.upstream.outputs.tag }}
          docker push ghcr.io/smallpygmy/backrest-custom:latest
